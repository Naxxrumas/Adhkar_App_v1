<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--th-surface, #f8fafc);
            color: var(--th-body, #64748b);
        }

        *,
        *::before,
        *::after {
            transition: background-color 0.4s ease, border-color 0.4s ease, color 0.4s ease, box-shadow 0.4s ease;
        }

        .tap-scale:active {
            transform: scale(0.95);
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        white: 'var(--th-card, #ffffff)',
                        slate: {
                            50: 'var(--th-surface, #f8fafc)',
                            100: 'var(--th-card-border, #f1f5f9)',
                            200: 'var(--th-input-border, #e2e8f0)',
                            400: 'var(--th-muted, #94a3b8)',
                            500: 'var(--th-body, #64748b)',
                            600: 'var(--th-body, #475569)',
                            700: 'var(--th-heading, #334155)',
                            800: 'var(--th-heading, #1e293b)'
                        },
                        emerald: {
                            50: 'var(--th-primary-light, #ecfdf5)',
                            100: 'var(--th-primary-light, #d1fae5)',
                            200: 'var(--th-primary-shadow, #a7f3d0)',
                            400: 'var(--th-primary-dark, #34d399)',
                            500: 'var(--th-primary, #10b981)',
                            600: 'var(--th-primary, #059669)',

                        },
                        amber: {
                            50: 'var(--th-primary-light, #fffbeb)',
                            100: 'var(--th-primary-light, #fef3c7)',
                            200: 'var(--th-primary-shadow, #fde68a)',
                            500: 'var(--th-primary, #f59e0b)',
                            600: 'var(--th-primary-dark, #d97706)'

                    }
                }
            }
        }
